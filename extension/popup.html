<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 280px;
      padding: 20px;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #100E13;
      color: #F5F0EB;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .icon {
      font-size: 24px;
    }

    .title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 18px;
      font-weight: 600;
      color: #F5F0EB;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 11px;
      color: hsl(30, 8%, 55%);
      margin-top: 1px;
    }

    .description {
      font-size: 13px;
      color: hsl(30, 8%, 55%);
      line-height: 1.5;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid hsl(270, 5%, 18%);
    }

    .btn-dashboard {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: #F5F0EB;
      color: #100E13;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-dashboard:hover {
      background: rgba(245, 240, 235, 0.9);
    }

    .note {
      margin-top: 12px;
      font-size: 11px;
      color: hsl(30, 8%, 45%);
      line-height: 1.4;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="icon">📋</span>
    <div>
      <div class="title">Job Tracker</div>
      <div class="subtitle">Zero manual entry</div>
    </div>
  </div>

  <p class="description">
    Automatically captures job applications as you fill them out and tracks email updates from employers.
  </p>

  <a class="btn-dashboard" href="https://job-tracker-v2-kappa.vercel.app/dashboard" target="_blank">
    Open Dashboard
  </a>

  <p class="note">
    The extension runs automatically on job application pages.
  </p>

  <script>
    document.querySelector(".btn-dashboard").addEventListener("click", (e) => {
      e.preventDefault();
      chrome.tabs.create({ url: e.currentTarget.href });
    });
  </script>
</body>
</html>
