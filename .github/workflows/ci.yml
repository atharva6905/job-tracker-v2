name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tracker
          POSTGRES_PASSWORD: tracker
          POSTGRES_DB: tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_DIRECT: postgresql://tracker:tracker@localhost:5432/tracker_test
      DATABASE_URL: postgresql://tracker:tracker@localhost:5432/tracker_test
      SUPABASE_JWT_SECRET: test-secret-for-ci
      SUPABASE_URL: not-used-in-tests
      TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
      GEMINI_API_KEY: not-used-in-tests
      GOOGLE_CLIENT_ID: not-used-in-tests
      GOOGLE_CLIENT_SECRET: not-used-in-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Audit dependencies (pip-audit)
        working-directory: backend
        run: pip-audit -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v
